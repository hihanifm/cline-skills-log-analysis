# Build cline-log-analysis-setup.exe (PyInstaller) and attach it to GitHub Releases.
# Mirrors build_windows_exe.bat. Manual runs produce a workflow artifact only.

name: Windows installer (exe)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build exe
        shell: cmd
        run: >
          pyinstaller --onefile --console --name cline-log-analysis-setup
          --add-data "skills;skills"
          --add-data "yaml_utils.py;."
          --add-data "config.py;."
          --add-data "workflow_config.yaml;."
          windows_installer.py

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cline-log-analysis-setup-windows
          path: dist/cline-log-analysis-setup.exe

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          "dist/cline-log-analysis-setup.exe"
          --repo "${{ github.repository }}"
          --clobber
