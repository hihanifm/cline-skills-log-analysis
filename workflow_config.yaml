llm:
  # Default backend for log_synthesizer_agent:
  # - "cline"  → write SUMMARY_PROMPT markers for Cline to fill
  # - "openai" → call OpenAI-compatible API directly (set LLM_API_KEY env var)
  backend: cline

  # Base URL for the OpenAI-compatible API. Uncomment to override.
  # Works with OpenAI, Azure OpenAI, local models (Ollama, LM Studio), etc.
  # base_url: https://api.openai.com/v1

  # Model to use when backend is "openai". Uncomment to override.
  # model: gpt-4o-mini

output:
  # Set to false to overwrite the same out/<workflow-name>/ directory each run.
  # Set to true (default) to create out/<workflow-name>-2/, -3/, etc.
  versioned: true

  # Set to false to skip generating report.html alongside report.md.
  html_report: true
