llm:
  # Default backend for log_synthesizer_agent:
  # - "cline"     → write SUMMARY_PROMPT markers for Cline to fill
  # - "anthropic" → call Anthropic API directly
  backend: cline

  # Name of the environment variable that holds the Anthropic API key.
  api_key_env: ANTHROPIC_API_KEY

output:
  # Set to false to overwrite the same out/<workflow-name>/ directory each run.
  # Set to true (default) to create out/<workflow-name>-2/, -3/, etc.
  versioned: true
